<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white p-6 rounded-xl shadow-lg">
    <h1 class="text-2xl font-bold text-center mb-4">Reset Password</h1>

    <input id="email" type="email" placeholder="Enter your email"
      class="w-full p-2 border rounded mb-4">

    <button id="resetBtn"
      class="w-full bg-purple-600 text-white py-2 rounded">
      Send reset link
    </button>

    <p class="text-center text-sm mt-3">
      <a href="login.html" class="text-blue-600 underline">Back to login</a>
    </p>
  </div>

<script type="module">
  import { createClient } 
    from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const supabase = createClient("https://sguhhxzqsyyquvdrnymn.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNndWhoeHpxc3l5cXV2ZHJueW1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjA3OTYsImV4cCI6MjA5MTM5Njc5Nn0.BI9xJGVhIiZfyo8ZWtshIKNcqbVjkE074XlbvD4xa3c");
  document.getElementById("resetBtn").onclick = async () => {

    const email = document.getElementById("email").value.trim();

    if (!email) {
      alert("Enter your email");
      return;
    }

    const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
     redirectTo: "https://files-and-document-saver.vercel.app/update-password.html"
    });

    if (error) {
      alert(error.message);
      return;
    }

    alert("Reset link sent to your email!");
  };
</script>

</body>
</html>
