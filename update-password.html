<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white p-6 rounded-xl shadow-lg">
    <h1 class="text-2xl font-bold text-center mb-4">Set New Password</h1>

    <input id="newPassword" type="password" placeholder="Enter new password"
      class="w-full p-2 border rounded mb-3">

    <input id="confirmPassword" type="password" placeholder="Confirm new password"
      class="w-full p-2 border rounded mb-4">

    <button id="updateBtn"
      class="w-full bg-purple-600 text-white py-2 rounded">
      Update Password
    </button>

    <p class="text-center text-sm mt-3">
      <a href="login.html" class="text-blue-600 underline">Back to login</a>
    </p>
  </div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const supabase = createClient(
    "https://zeeuzluvbpfaywptekbs.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplZXV6bHV2YnBmYXl3cHRla2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQyMjM3NzMsImV4cCI6MjA3OTc5OTc3M30.9S4sd1ck2tC3g8Spg9DTL63sKXlYMt-DYUAomLwayq4"
  );

  // Extract access token from URL
  const urlParams = new URLSearchParams(window.location.search);
  const accessToken = urlParams.get('access_token');

  if (!accessToken) {
    alert("Invalid or missing reset token.");
  }

  document.getElementById("updateBtn").onclick = async () => {
    const newPassword = document.getElementById("newPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (!newPassword || !confirmPassword) {
      alert("Please enter and confirm your new password.");
      return;
    }

    if (newPassword !== confirmPassword) {
      alert("Passwords do not match!");
      return;
    }

    // Update password with Supabase
    const { data, error } = await supabase.auth.updateUser({
      accessToken: accessToken,
      password: newPassword
    });

    if (error) {
      alert("Error: " + error.message);
      return;
    }

    alert("Password updated successfully! Please login with your new password.");
    window.location.href = "login.html";
  };
</script>

</body>
</html>
