<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://sguhhxzqsyyquvdrnymn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNndWhoeHpxc3l5cXV2ZHJueW1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjA3OTYsImV4cCI6MjA5MTM5Njc5Nn0.BI9xJGVhIiZfyo8ZWtshIKNcqbVjkE074XlbvD4xa3c"; // IMPORTANT: use ANON KEY ONLY

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
window.supabase = supabase;
</script>

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('download.jpg') center/cover no-repeat fixed;
}
.glass-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border-radius: 15px;
}
</style>
</head>

<body class="p-6 min-h-screen">

<h1 class="text-white text-3xl font-bold text-center mb-6">File Manager (Supabase)</h1>

<div class="grid md:grid-cols-3 gap-6">

<!-- DOCUMENTS -->
<div class="glass-card p-4">
<h2 class="font-bold mb-2">Documents</h2>
<input id="docUpload" type="file" class="mb-2"/>
<textarea id="docDesc" class="w-full border p-2 mb-2"></textarea>
<button onclick="uploadFile('document')" class="bg-blue-600 text-white px-3 py-1 rounded w-full">Upload</button>
<div id="docList"></div>
</div>

<!-- IMAGES -->
<div class="glass-card p-4">
<h2 class="font-bold mb-2">Images</h2>
<input id="imgUpload" type="file" class="mb-2"/>
<textarea id="imgDesc" class="w-full border p-2 mb-2"></textarea>
<button onclick="uploadFile('image')" class="bg-green-600 text-white px-3 py-1 rounded w-full">Upload</button>
<div id="imgList"></div>
</div>

<!-- VIDEOS -->
<div class="glass-card p-4">
<h2 class="font-bold mb-2">Videos</h2>
<input id="vidUpload" type="file" class="mb-2"/>
<textarea id="vidDesc" class="w-full border p-2 mb-2"></textarea>
<button onclick="uploadFile('video')" class="bg-red-600 text-white px-3 py-1 rounded w-full">Upload</button>
<div id="vidList"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
  <div class="bg-white p-4 rounded w-[80%] relative">
    <button onclick="closeModal()" class="absolute right-2 top-2 text-red-600 text-xl">✖</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>

let user = null;

async function init() {
  const { data } = await supabase.auth.getSession();
  user = data.session?.user;

  if (!user) {
    alert("Not logged in");
    window.location.href = "login.html";
    return;
  }

  loadFiles();
}

init();

// ================= UPLOAD =================
async function uploadFile(type) {
  const fileInput =
    type === "document" ? docUpload :
    type === "image" ? imgUpload :
    vidUpload;

  const descInput =
    type === "document" ? docDesc :
    type === "image" ? imgDesc :
    vidDesc;

  if (!fileInput.files.length) return alert("Select file");

  const file = fileInput.files[0];
  const path = `${user.id}/${Date.now()}-${file.name}`;

  // upload to storage
  const { error: uploadError } = await supabase
    .storage.from("user_files")
    .upload(path, file);

  if (uploadError) return alert(uploadError.message);

  const { data } = supabase.storage.from("user_files").getPublicUrl(path);

  // save to DB
  await supabase.from("files").insert({
    user_id: user.id,
    name: file.name,
    description: descInput.value,
    type,
    path,
    url: data.publicUrl
  });

  fileInput.value = "";
  descInput.value = "";

  loadFiles();
}

// ================= LOAD =================
async function loadFiles() {
  const { data } = await supabase
    .from("files")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  docList.innerHTML = "";
  imgList.innerHTML = "";
  vidList.innerHTML = "";

  data.forEach(f => {
    const div = document.createElement("div");
    div.className = "p-2 bg-white rounded shadow mt-2";

    if (f.type === "image") {
      div.innerHTML = `<img src="${f.url}" class="w-full h-40 object-cover cursor-pointer" onclick="openModal('${f.url}','image')">`;
      imgList.appendChild(div);
    }

    else if (f.type === "video") {
      div.innerHTML = `<video src="${f.url}" class="w-full h-40 cursor-pointer" onclick="openModal('${f.url}','video')"></video>`;
      vidList.appendChild(div);
    }

    else {
      div.innerHTML = `<p class="cursor-pointer" onclick="openModal('${f.url}','doc')">${f.name}</p>`;
      docList.appendChild(div);
    }

    const btn = document.createElement("button");
    btn.innerText = "Delete";
    btn.className = "bg-red-500 text-white px-2 mt-2 text-sm rounded";
    btn.onclick = async () => {
      await supabase.storage.from("user_files").remove([f.path]);
      await supabase.from("files").delete().eq("id", f.id);
      loadFiles();
    };

    div.appendChild(btn);
  });
}

// ================= MODAL =================
function openModal(url, type) {
  const box = document.getElementById("modalContent");

  if (type === "image") box.innerHTML = `<img src="${url}" class="w-full">`;
  if (type === "video") box.innerHTML = `<video src="${url}" controls autoplay class="w-full"></video>`;
  if (type === "doc") box.innerHTML = `<iframe src="${url}" class="w-full h-[500px]"></iframe>`;

  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

window.openModal = openModal;
window.closeModal = closeModal;

</script>

</body>
</html>
