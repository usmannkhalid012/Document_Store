<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://sguhhxzqsyyquvdrnymn.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY"; // ❗ NEVER use sb_secret_

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
window.supabase = supabase;
</script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('download.jpg') center/cover no-repeat fixed;
  min-height: 100vh;
}
.glass {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  padding: 16px;
  border-radius: 12px;
}
</style>
</head>

<body class="p-6 min-h-screen">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-white text-3xl font-bold">Dashboard</h1>

  <div>
    <span id="userEmail" class="text-white"></span>
    <button id="logoutBtn" class="bg-red-600 text-white px-3 py-2 rounded ml-3">
      Logout
    </button>
  </div>
</div>

<!-- UPLOAD SECTION -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- DOCUMENTS -->
  <div class="glass">
    <h2 class="font-semibold mb-3">📄 Documents</h2>
    <input id="docUpload" type="file" class="mb-2 w-full"/>
    <textarea id="docDesc" placeholder="Description" class="w-full border p-2 rounded mb-2"></textarea>
    <button id="uploadDoc" class="bg-blue-600 text-white px-3 py-2 rounded w-full">
      Upload Document
    </button>
    <div id="docsList" class="mt-4"></div>
  </div>

  <!-- IMAGES -->
  <div class="glass">
    <h2 class="font-semibold mb-3">🖼 Images</h2>
    <input id="imgUpload" type="file" accept="image/*" class="mb-2 w-full"/>
    <textarea id="imgDesc" placeholder="Description" class="w-full border p-2 rounded mb-2"></textarea>
    <button id="uploadImg" class="bg-green-600 text-white px-3 py-2 rounded w-full">
      Upload Image
    </button>
    <div id="imagesList" class="mt-4 grid gap-3"></div>
  </div>

  <!-- VIDEOS -->
  <div class="glass">
    <h2 class="font-semibold mb-3">🎥 Videos</h2>
    <input id="vidUpload" type="file" accept="video/*" class="mb-2 w-full"/>
    <textarea id="vidDesc" placeholder="Description" class="w-full border p-2 rounded mb-2"></textarea>
    <button id="uploadVid" class="bg-purple-600 text-white px-3 py-2 rounded w-full">
      Upload Video
    </button>
    <div id="videosList" class="mt-4"></div>
  </div>

</div>

<!-- MODAL -->
<div id="previewModal"
     class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">

  <div class="bg-white rounded-xl p-4 max-w-3xl w-full relative">

    <button id="closePreview"
            class="absolute right-3 top-2 text-red-600 text-2xl">
      ✖
    </button>

    <div id="previewContent"></div>

  </div>
</div>

<script type="module">
const supabase = window.supabase;

let user = null;

/* ---------- AUTH ---------- */
(async () => {
  const { data } = await supabase.auth.getSession();
  user = data.session?.user;

  if (!user) window.location.href = "login.html";

  document.getElementById("userEmail").innerText = user.email;
  loadFiles();
})();

/* ---------- LOGOUT ---------- */
document.getElementById("logoutBtn").onclick = async () => {
  await supabase.auth.signOut();
  window.location.href = "login.html";
};

/* ---------- UPLOAD ---------- */
async function uploadFile(type, input, descInput) {
  const file = input.files[0];
  if (!file) return alert("Select file");

  const path = `${user.id}/${Date.now()}-${file.name}`;

  const { error } = await supabase.storage
    .from("user_files")
    .upload(path, file);

  if (error) return alert(error.message);

  const { data } = supabase.storage
    .from("user_files")
    .getPublicUrl(path);

  await supabase.from("files").insert({
    user_id: user.id,
    name: file.name,
    description: descInput.value,
    type,
    path,
    url: data.publicUrl
  });

  input.value = "";
  descInput.value = "";
  loadFiles();
}

document.getElementById("uploadImg").onclick = () =>
  uploadFile("image", imgUpload, imgDesc);

document.getElementById("uploadVid").onclick = () =>
  uploadFile("video", vidUpload, vidDesc);

/* ---------- LOAD FILES ---------- */
async function loadFiles() {
  const { data } = await supabase
    .from("files")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  imagesList.innerHTML = "";
  videosList.innerHTML = "";

  data.forEach(row => {
    const card = document.createElement("div");
    card.className = "bg-white p-2 rounded shadow";

    if (row.type === "image") {
      const img = document.createElement("img");
      img.src = row.url;
      img.className = "w-full h-40 object-cover rounded cursor-pointer";
      img.onclick = () => openModal("image", row.url);
      card.appendChild(img);
      imagesList.appendChild(card);
    }

    if (row.type === "video") {
      const vid = document.createElement("video");
      vid.src = row.url;
      vid.className = "w-full h-40 rounded cursor-pointer";
      vid.onclick = () => openModal("video", row.url);
      card.appendChild(vid);
      videosList.appendChild(card);
    }
  });
}

/* ---------- MODAL ---------- */
const modal = document.getElementById("previewModal");
const content = document.getElementById("previewContent");
const closeBtn = document.getElementById("closePreview");

function openModal(type, url) {
  content.innerHTML =
    type === "image"
      ? `<img src="${url}" class="w-full rounded">`
      : `<video src="${url}" controls autoplay class="w-full rounded"></video>`;

  modal.classList.remove("hidden");
}

function closeModal() {
  modal.classList.add("hidden");
  content.innerHTML = ""; // stop video
}

/* CLOSE EVENTS */
closeBtn.addEventListener("click", closeModal);

modal.addEventListener("click", (e) => {
  if (e.target === modal) closeModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});
</script>

</body>
</html>
