<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// ✅ ALWAYS use ANON KEY (NOT secret)
const SUPABASE_URL = "https://sguhhxzqsyyquvdrnymn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNndWhoeHpxc3l5cXV2ZHJueW1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjA3OTYsImV4cCI6MjA5MTM5Njc5Nn0.BI9xJGVhIiZfyo8ZWtshIKNcqbVjkE074XlbvD4xa3c";

window.supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
  url('download.jpg') center/cover no-repeat fixed;
  min-height: 100vh;
}
.glass {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  padding: 16px;
  border-radius: 12px;
}
</style>
</head>

<body class="p-6 min-h-screen">

<div class="flex justify-between items-center mb-6">
  <h1 class="text-white text-3xl font-bold">Dashboard</h1>
  <div>
    <span id="userEmail" class="text-white mr-3"></span>
    <button id="logoutBtn" class="bg-red-600 text-white px-3 py-2 rounded">Logout</button>
  </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- DOCUMENTS -->
  <div class="glass">
    <h2 class="font-bold mb-2">Documents</h2>
    <input id="docUpload" type="file" class="mb-2 w-full">
    <textarea id="docDesc" class="w-full border p-2 mb-2" placeholder="Description"></textarea>
    <button id="uploadDoc" class="bg-blue-600 text-white w-full py-2">Upload</button>
    <div id="docsList" class="mt-3"></div>
  </div>

  <!-- IMAGES -->
  <div class="glass">
    <h2 class="font-bold mb-2">Images</h2>
    <input id="imgUpload" type="file" accept="image/*" class="mb-2 w-full">
    <textarea id="imgDesc" class="w-full border p-2 mb-2"></textarea>
    <button id="uploadImg" class="bg-green-600 text-white w-full py-2">Upload</button>
    <div id="imagesList" class="mt-3"></div>
  </div>

  <!-- VIDEOS -->
  <div class="glass">
    <h2 class="font-bold mb-2">Videos</h2>
    <input id="vidUpload" type="file" accept="video/*" class="mb-2 w-full">
    <textarea id="vidDesc" class="w-full border p-2 mb-2"></textarea>
    <button id="uploadVid" class="bg-purple-600 text-white w-full py-2">Upload</button>
    <div id="videosList" class="mt-3"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-white p-4 w-3/4 relative rounded">
    <button id="closeModal" class="absolute right-2 top-2 text-red-600 text-xl">✖</button>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module">
const supabase = window.supabase;

// DOM ELEMENTS
const docUpload = document.getElementById("docUpload");
const imgUpload = document.getElementById("imgUpload");
const vidUpload = document.getElementById("vidUpload");

const docDesc = document.getElementById("docDesc");
const imgDesc = document.getElementById("imgDesc");
const vidDesc = document.getElementById("vidDesc");

// AUTH CHECK
let user;

async function init() {
  const { data } = await supabase.auth.getSession();
  user = data.session?.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("userEmail").innerText = user.email;
  loadFiles();
}

init();

// LOGOUT
document.getElementById("logoutBtn").onclick = async () => {
  await supabase.auth.signOut();
  window.location.href = "login.html";
};

// UPLOAD FUNCTION
async function uploadFile(type, input, desc) {
  if (!input.files.length) return alert("Select file");

  const file = input.files[0];
  const path = `${user.id}/${Date.now()}-${file.name}`;

  const { error } = await supabase.storage
    .from("user_files")
    .upload(path, file);

  if (error) return alert(error.message);

  const { data } = supabase.storage
    .from("user_files")
    .getPublicUrl(path);

  await supabase.from("files").insert({
    user_id: user.id,
    name: file.name,
    description: desc.value,
    type,
    path,
    url: data.publicUrl
  });

  input.value = "";
  desc.value = "";

  loadFiles();
}

// BUTTON EVENTS
document.getElementById("uploadDoc").onclick = () =>
  uploadFile("document", docUpload, docDesc);

document.getElementById("uploadImg").onclick = () =>
  uploadFile("image", imgUpload, imgDesc);

document.getElementById("uploadVid").onclick = () =>
  uploadFile("video", vidUpload, vidDesc);

// LOAD FILES
async function loadFiles() {
  const { data } = await supabase
    .from("files")
    .select("*")
    .eq("user_id", user.id);

  document.getElementById("docsList").innerHTML = "";
  document.getElementById("imagesList").innerHTML = "";
  document.getElementById("videosList").innerHTML = "";

  data.forEach(file => {
    const div = document.createElement("div");
    div.className = "bg-white p-2 rounded mb-2";

    if (file.type === "image") {
      div.innerHTML = `<img src="${file.url}" class="w-full cursor-pointer">`;
    } else if (file.type === "video") {
      div.innerHTML = `<video src="${file.url}" class="w-full cursor-pointer"></video>`;
    } else {
      div.innerHTML = `<p class="cursor-pointer">${file.name}</p>`;
    }

    div.onclick = () => openModal(file);
    
    const container =
      file.type === "image"
        ? document.getElementById("imagesList")
        : file.type === "video"
        ? document.getElementById("videosList")
        : document.getElementById("docsList");

    container.appendChild(div);
  });
}

// MODAL OPEN/CLOSE FIXED
function openModal(file) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  content.innerHTML =
    file.type === "image"
      ? `<img src="${file.url}" class="w-full">`
      : file.type === "video"
      ? `<video src="${file.url}" controls autoplay class="w-full"></video>`
      : `<iframe src="${file.url}" class="w-full h-[70vh]"></iframe>`;

  modal.classList.remove("hidden");
}

document.getElementById("closeModal").onclick = () => {
  document.getElementById("modal").classList.add("hidden");
};
</script>

</body>
</html>
