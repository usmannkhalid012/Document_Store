<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://sguhhxzqsyyquvdrnymn.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY"; // ❗ never use secret key

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
window.supabase = supabase;
</script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('download.jpg') center/cover no-repeat fixed;
  min-height: 100vh;
}
.glass {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  padding: 16px;
  border-radius: 12px;
}
</style>
</head>

<body class="p-6 min-h-screen">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-white text-3xl font-bold">Dashboard</h1>

  <div>
    <span id="userEmail" class="text-white"></span>
    <button id="logoutBtn" class="bg-red-600 text-white px-3 py-2 rounded ml-3">Logout</button>
  </div>
</div>

<!-- UPLOAD BOXES -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <div class="glass">
    <h2>📄 Documents</h2>
    <input id="docUpload" type="file" class="w-full mb-2"/>
    <textarea id="docDesc" class="w-full border p-2 mb-2" placeholder="Description"></textarea>
    <button id="uploadDoc" class="bg-blue-600 text-white w-full py-2">Upload</button>
    <div id="docsList"></div>
  </div>

  <div class="glass">
    <h2>🖼 Images</h2>
    <input id="imgUpload" type="file" accept="image/*" class="w-full mb-2"/>
    <textarea id="imgDesc" class="w-full border p-2 mb-2" placeholder="Description"></textarea>
    <button id="uploadImg" class="bg-green-600 text-white w-full py-2">Upload</button>
    <div id="imagesList" class="grid gap-2"></div>
  </div>

  <div class="glass">
    <h2>🎥 Videos</h2>
    <input id="vidUpload" type="file" accept="video/*" class="w-full mb-2"/>
    <textarea id="vidDesc" class="w-full border p-2 mb-2" placeholder="Description"></textarea>
    <button id="uploadVid" class="bg-purple-600 text-white w-full py-2">Upload</button>
    <div id="videosList"></div>
  </div>

</div>

<!-- MODAL -->
<div id="previewModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
  <div class="bg-white p-4 rounded-xl w-full max-w-3xl relative">

    <button id="closePreview" class="absolute right-3 top-2 text-red-600 text-2xl">✖</button>

    <div id="previewContent"></div>

  </div>
</div>

<script type="module">
const supabase = window.supabase;

let user = null;
let currentVideo = null;

/* ---------- AUTH ---------- */
(async () => {
  const { data } = await supabase.auth.getSession();
  user = data.session?.user;

  if (!user) window.location.href = "login.html";

  document.getElementById("userEmail").innerText = user.email;
  loadFiles();
})();

/* ---------- LOGOUT ---------- */
document.getElementById("logoutBtn").onclick = async () => {
  await supabase.auth.signOut();
  window.location.href = "login.html";
};

/* ---------- UPLOAD ---------- */
async function uploadFile(type, input, descInput) {
  const file = input.files[0];
  if (!file) return alert("Select file");

  const path = `${user.id}/${Date.now()}-${file.name}`;

  const { error } = await supabase.storage
    .from("user_files")
    .upload(path, file);

  if (error) return alert(error.message);

  const { data } = supabase.storage
    .from("user_files")
    .getPublicUrl(path);

  await supabase.from("files").insert({
    user_id: user.id,
    name: file.name,
    description: descInput.value,
    type,
    path,
    url: data.publicUrl
  });

  input.value = "";
  descInput.value = "";

  loadFiles();
}

/* ---------- BUTTONS ---------- */
document.getElementById("uploadImg").onclick = () =>
  uploadFile("image", imgUpload, imgDesc);

document.getElementById("uploadVid").onclick = () =>
  uploadFile("video", vidUpload, vidDesc);

document.getElementById("uploadDoc").onclick = () =>
  uploadFile("document", docUpload, docDesc);

/* ---------- LOAD FILES ---------- */
async function loadFiles() {
  const { data } = await supabase
    .from("files")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  imagesList.innerHTML = "";
  videosList.innerHTML = "";
  docsList.innerHTML = "";

  data.forEach(row => {
    const card = document.createElement("div");
    card.className = "bg-white p-2 rounded shadow mt-2";

    // IMAGE
    if (row.type === "image") {
      const img = document.createElement("img");
      img.src = row.url;
      img.className = "w-full h-40 object-cover rounded cursor-pointer";
      img.onclick = () => openPreview("image", row.url);
      card.appendChild(img);
      imagesList.appendChild(card);
    }

    // VIDEO
    if (row.type === "video") {
      const vid = document.createElement("video");
      vid.src = row.url;
      vid.className = "w-full h-40 rounded cursor-pointer";
      vid.onclick = () => openPreview("video", row.url);
      card.appendChild(vid);
      videosList.appendChild(card);
    }

    // DOC
    if (row.type === "document") {
      const p = document.createElement("p");
      p.innerText = row.name;
      p.className = "cursor-pointer font-semibold";
      p.onclick = () => window.open(row.url, "_blank");
      card.appendChild(p);
      docsList.appendChild(card);
    }

    // DESC
    const desc = document.createElement("p");
    desc.innerText = row.description || "";
    desc.className = "text-sm text-gray-600";
    card.appendChild(desc);

    // ACTIONS
    const actions = document.createElement("div");
    actions.className = "flex gap-2 mt-2";

    // DOWNLOAD FIXED
    const dl = document.createElement("button");
    dl.innerText = "Download";
    dl.className = "bg-blue-600 text-white px-2 py-1 text-sm rounded";

    dl.onclick = async () => {
      const res = await fetch(row.url);
      const blob = await res.blob();

      const url = window.URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = row.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
    };

    // DELETE
    const del = document.createElement("button");
    del.innerText = "Delete";
    del.className = "bg-red-600 text-white px-2 py-1 text-sm rounded";

    del.onclick = async () => {
      await supabase.storage.from("user_files").remove([row.path]);
      await supabase.from("files").delete().eq("id", row.id);
      loadFiles();
    };

    actions.appendChild(dl);
    actions.appendChild(del);
    card.appendChild(actions);
  });
}

/* ---------- MODAL FIXED ---------- */
const modal = document.getElementById("previewModal");
const content = document.getElementById("previewContent");

function openPreview(type, url) {
  content.innerHTML = "";

  if (type === "image") {
    content.innerHTML = `<img src="${url}" class="w-full rounded">`;
  }

  if (type === "video") {
    content.innerHTML = `
      <video id="modalVideo" src="${url}" controls autoplay class="w-full rounded"></video>
    `;
    currentVideo = document.getElementById("modalVideo");
  }

  modal.classList.remove("hidden");
}

function closeModal() {
  modal.classList.add("hidden");
  content.innerHTML = "";

  if (currentVideo) {
    currentVideo.pause();
    currentVideo.currentTime = 0;
    currentVideo = null;
  }
}

document.getElementById("closePreview").onclick = closeModal;

modal.addEventListener("click", (e) => {
  if (e.target === modal) closeModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});
</script>

</body>
</html>
