<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55));
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.80);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    h1 {
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
    }
  </style>
</head>

<body class="min-h-screen p-6">

<h1 class="text-4xl font-bold text-white mb-8 text-center">
  Files and Document Store (Supabase)
</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

  <!-- Documents -->
  <div class="glass-card p-6 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">📄 Documents</h2>

    <input type="file" id="docUpload" class="mb-2" />
    <textarea id="docDescription" class="w-full p-2 mb-4 border rounded" placeholder="Description"></textarea>

    <button onclick="saveFile('docs','docUpload','docDescription')" class="bg-blue-600 text-white px-4 py-2 rounded-xl">
      Save Document
    </button>

    <div id="docList" class="mt-4"></div>
  </div>

  <!-- Images -->
  <div class="glass-card p-6 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">🖼 Images</h2>

    <input type="file" id="imgUpload" accept="image/*" class="mb-2" />
    <textarea id="imgDescription" class="w-full p-2 mb-4 border rounded" placeholder="Description"></textarea>

    <button onclick="saveFile('images','imgUpload','imgDescription')" class="bg-green-600 text-white px-4 py-2 rounded-xl">
      Save Image
    </button>

    <div id="imgList" class="mt-4"></div>
  </div>

  <!-- Videos -->
  <div class="glass-card p-6 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">🎥 Videos</h2>

    <input type="file" id="vidUpload" accept="video/*" class="mb-2" />
    <textarea id="vidDescription" class="w-full p-2 mb-4 border rounded" placeholder="Description"></textarea>

    <button onclick="saveFile('videos','vidUpload','vidDescription')" class="bg-red-600 text-white px-4 py-2 rounded-xl">
      Save Video
    </button>

    <div id="vidList" class="mt-4"></div>
  </div>

</div>

<!-- Preview Modal -->
<div id="previewModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center p-4 z-50">
  <div class="glass-card p-6 rounded-2xl max-w-3xl w-full relative">
    <button onclick="closePreview()" class="absolute top-3 right-3 text-red-600 text-2xl">✖</button>
    <div id="previewContent" class="mt-6"></div>
  </div>
</div>

<script>
/* =========================
   SUPABASE CONFIG
========================= */
const SUPABASE_URL = "https://sguhhxzqsyyquvdrnymn.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNndWhoeHpxc3l5cXV2ZHJueW1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjA3OTYsImV4cCI6MjA5MTM5Njc5Nn0.BI9xJGVhIiZfyo8ZWtshIKNcqbVjkE074XlbvD4xa3c";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   UPLOAD FILE
========================= */
async function saveFile(type, uploadId, descriptionId) {
  const fileInput = document.getElementById(uploadId);
  const descInput = document.getElementById(descriptionId);

  if (!fileInput.files.length) {
    alert("Select a file first");
    return;
  }

  const file = fileInput.files[0];
  const description = descInput.value;

  const reader = new FileReader();

  reader.onload = async function (e) {
    const base64 = e.target.result;

    const { error } = await supabaseClient.from("files").insert([
      {
        type,
        name: file.name,
        description,
        data: base64
      }
    ]);

    if (error) {
      console.error(error);
      alert("Upload failed");
      return;
    }

    location.reload();
  };

  reader.readAsDataURL(file);
}

/* =========================
   LOAD FILES
========================= */
window.onload = function () {
  loadFiles("docs", "docList");
  loadFiles("images", "imgList");
  loadFiles("videos", "vidList");
};

async function loadFiles(type, containerId) {
  const container = document.getElementById(containerId);

  const { data, error } = await supabaseClient
    .from("files")
    .select("*")
    .eq("type", type);

  if (error) {
    console.error(error);
    return;
  }

  container.innerHTML = "";

  data.forEach((file) => {
    container.innerHTML += `
      <div class="p-3 bg-white/70 rounded-xl mb-3 shadow">

        ${
          type === "docs"
            ? `<p class="font-bold cursor-pointer" onclick="openPreview('document','${file.data}')">${file.name}</p>`
            : ""
        }

        ${
          type === "images"
            ? `<img src="${file.data}" class="w-full h-40 object-cover rounded cursor-pointer" onclick="openPreview('image','${file.data}')"/>`
            : ""
        }

        ${
          type === "videos"
            ? `<video src="${file.data}" class="w-full h-40 rounded cursor-pointer" onclick="openPreview('video','${file.data}')" muted></video>`
            : ""
        }

        <p class="text-sm text-gray-700 mt-2">${file.description || ""}</p>

        <button onclick="deleteFile('${file.id}')" class="bg-red-600 text-white px-3 py-1 mt-2 rounded">
          Delete
        </button>
      </div>
    `;
  });
}

/* =========================
   DELETE FILE
========================= */
async function deleteFile(id) {
  const { error } = await supabaseClient
    .from("files")
    .delete()
    .eq("id", id);

  if (error) {
    alert("Delete failed");
    return;
  }

  location.reload();
}

/* =========================
   PREVIEW
========================= */
function openPreview(type, data) {
  const box = document.getElementById("previewContent");

  if (type === "image") {
    box.innerHTML = `<img src="${data}" class="w-full rounded-xl"/>`;
  } 
  else if (type === "video") {
    box.innerHTML = `<video src="${data}" controls autoplay class="w-full rounded-xl"></video>`;
  } 
  else {
    box.innerHTML = `<iframe src="${data}" class="w-full h-[500px] rounded-xl"></iframe>`;
  }

  document.getElementById("previewModal").classList.remove("hidden");
}

function closePreview() {
  document.getElementById("previewModal").classList.add("hidden");
}
</script>

</body>
</html>
